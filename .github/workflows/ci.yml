name: RacOS CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  CARGO_TARGET_DIR: ${{ github.workspace }}/target

jobs:
  build:
    name: Build kernel + bootloader + userland
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (pinned via rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, llvm-tools-preview
          targets: x86_64-unknown-none, x86_64-unknown-uefi

      - name: Install system deps (nasm)
        run: sudo apt-get update && sudo apt-get install -y nasm

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build kernel (racore)
        run: cargo build --package racore --target x86_64-unknown-none

      - name: Build bootloader (racos-boot)
        run: cargo build --package racos-boot --target x86_64-unknown-uefi

      - name: Build userland workspace
        # Build for x86_64-unknown-none (matches build-image.ps1) — building
        # against the host toolchain pulls in libgcc and collides with
        # libc_lite's no_std memcpy/memset/memmove. Pre-2026-05 CI happened
        # to work because the workspace was smaller; once more userland
        # binaries piled in this began failing at link time on racos-mkdir.
        # rpkg/rapt are host-side tooling (use std) so they can't share the
        # bare-metal target — excluded here, host build covered below.
        run: |
          cargo build --workspace \
            --exclude racore --exclude racos-boot \
            --exclude rpkg --exclude rapt \
            --target x86_64-unknown-none \
            -Z build-std=core,alloc \
            -Z build-std-features=compiler-builtins-mem

      - name: Build host-side packaging tools (rpkg + rapt)
        run: cargo build -p rpkg -p rapt

      - name: Upload kernel artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-elf
          path: target/x86_64-unknown-none/debug/racore
          if-no-files-found: warn

      - name: Upload bootloader artifact
        uses: actions/upload-artifact@v4
        with:
          name: bootloader-efi
          path: target/x86_64-unknown-uefi/debug/bootx64.efi
          if-no-files-found: warn

  test-unit:
    name: Unit & integration tests (host)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - name: Install nasm
        run: sudo apt-get update && sudo apt-get install -y nasm
      - name: Run host-side workspace tests
        # racsh's parser has #[test]s that run cleanly on host. Other crates
        # depend on libc-lite which collides with libgcc when linked against
        # the host toolchain, so we narrow the host-test set to racsh only.
        run: cargo test -p racsh
        continue-on-error: true

  boot-smoke:
    name: QEMU boot smoke (UEFI)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, llvm-tools-preview
          targets: x86_64-unknown-none, x86_64-unknown-uefi
      - name: Install QEMU, OVMF, nasm, python
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 ovmf nasm mtools python3

      - name: Build kernel + bootloader
        # Kernel MUST be linked with relocation-model=static + -no-pie or the
        # bootloader (which doesn't apply relocations) loads a PIE image whose
        # trait vtables point at garbage low memory → #UD on the first dyn
        # dispatch and the guest never prints anything.
        run: |
          RUSTFLAGS="-C relocation-model=static -C link-arg=-no-pie" \
            cargo build --package racore --target x86_64-unknown-none
          cargo build --package racos-boot --target x86_64-unknown-uefi

      - name: Stage ESP
        run: |
          mkdir -p esp/EFI/BOOT
          cp target/x86_64-unknown-uefi/debug/bootx64.efi esp/EFI/BOOT/BOOTX64.EFI
          cp target/x86_64-unknown-none/debug/racore esp/racore.elf
          if [ -d initramfs-root ]; then
            python3 scripts/pack-initramfs.py initramfs-root esp/initramfs.img || true
          fi
          ls -la esp/
          # Show what OVMF the runner actually has — paths vary between
          # Ubuntu releases (OVMF_CODE.fd vs OVMF_CODE_4M.fd).
          ls -la /usr/share/OVMF/ || true
          qemu-system-x86_64 --version | head -n 1

      - name: Boot in QEMU (15s budget)
        run: |
          # Ubuntu 24.04 renamed the OVMF code blob to OVMF_CODE_4M.fd and
          # dropped the symlink; older releases still ship OVMF_CODE.fd. Pick
          # whichever exists so the workflow survives a runner image bump.
          for cand in \
            /usr/share/OVMF/OVMF_CODE.fd \
            /usr/share/OVMF/OVMF_CODE_4M.fd \
            /usr/share/qemu/OVMF.fd; do
            if [ -f "$cand" ]; then OVMF="$cand"; break; fi
          done
          if [ -z "$OVMF" ]; then
            echo "FAIL: no OVMF firmware found"; exit 1
          fi
          echo "Using OVMF=$OVMF"
          qemu-system-x86_64 --version | head -n 1
          timeout 15 qemu-system-x86_64 \
            -machine q35 -cpu qemu64 -m 512M \
            -drive if=pflash,format=raw,file=$OVMF,readonly=on \
            -drive file=fat:rw:esp,format=raw \
            -serial stdio -display none -no-reboot \
            > boot.log 2>&1 || true
          echo "--- boot.log tail ---"
          tail -n 80 boot.log

      - name: Assert kernel reached idle loop + racsh prompt
        run: |
          grep -q "RACORE: RacOS kernel starting" boot.log \
            || (echo "FAIL: kernel did not start" && exit 1)
          grep -q "RACORE: Entering idle loop" boot.log \
            || (echo "FAIL: kernel did not reach idle loop" && exit 1)
          # Stronger assertion: PID 1 (init) ran AND spawned racsh AND racsh
          # printed its banner. Catches regressions in spawn/wait/sysret path.
          grep -q "\[init\] RacInit starting" boot.log \
            || (echo "FAIL: /sbin/init did not start" && exit 1)
          grep -q "\[init\] spawned /bin/sh" boot.log \
            || (echo "FAIL: init did not spawn racsh" && exit 1)
          grep -q "racsh 0.1.0" boot.log \
            || (echo "FAIL: racsh did not print banner" && exit 1)
          echo "Boot smoke PASSED — kernel + init + racsh all alive"

      - name: Upload boot log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: boot-log
          path: boot.log

  kernel-smoke-isadbg:
    name: Kernel smoke (isa-debug-exit assertions)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, llvm-tools-preview
          targets: x86_64-unknown-none, x86_64-unknown-uefi
      - name: Install QEMU, OVMF, nasm, python
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 ovmf nasm mtools python3

      - name: Build kernel (with ci-smoke feature) + bootloader
        run: |
          RUSTFLAGS="-C relocation-model=static -C link-arg=-no-pie" \
            cargo build --package racore --target x86_64-unknown-none --features ci-smoke
          cargo build --package racos-boot --target x86_64-unknown-uefi

      - name: Stage ESP
        run: |
          mkdir -p esp/EFI/BOOT
          cp target/x86_64-unknown-uefi/debug/bootx64.efi esp/EFI/BOOT/BOOTX64.EFI
          cp target/x86_64-unknown-none/debug/racore esp/racore.elf
          if [ -d initramfs-root ]; then
            python3 scripts/pack-initramfs.py initramfs-root esp/initramfs.img || true
          fi

      - name: Boot QEMU with isa-debug-exit (60s budget)
        id: smoke
        # Keep the QEMU args minimal — `-boot menu=on` / `-monitor null` are
        # needed on the Windows dev host (different OVMF build, multiplexed
        # stdio monitor) but break the Ubuntu CI runner where they cause
        # QEMU to exit before serial is opened. The Linux OVMF + serial
        # file: combo just works without them.
        run: |
          for cand in \
            /usr/share/OVMF/OVMF_CODE.fd \
            /usr/share/OVMF/OVMF_CODE_4M.fd \
            /usr/share/qemu/OVMF.fd; do
            if [ -f "$cand" ]; then OVMF="$cand"; break; fi
          done
          if [ -z "$OVMF" ]; then echo "FAIL: no OVMF firmware"; exit 1; fi
          echo "Using OVMF=$OVMF"
          qemu-system-x86_64 --version | head -n 1
          set +e
          # Provide a fresh sparse disk image so the smoke can exercise the
          # AHCI / racfs round-trip on /mnt. Re-created from zero each run so
          # the mnt::roundtrip assertion is deterministic across CI invocations.
          dd if=/dev/zero of=ci-smoke-disk.img bs=1M count=16 status=none
          timeout 60 qemu-system-x86_64 \
            -machine q35 -cpu qemu64 -m 512M \
            -drive if=pflash,format=raw,file=$OVMF,readonly=on \
            -drive file=fat:rw:esp,format=raw \
            -drive id=disk0,file=ci-smoke-disk.img,if=none,format=raw,cache=writethrough \
            -device ich9-ahci,id=ahci \
            -device ide-hd,drive=disk0,bus=ahci.0 \
            -serial file:smoke.log -display none \
            -no-reboot \
            -device isa-debug-exit,iobase=0xf4,iosize=0x04
          EXIT=$?
          set -e
          echo "QEMU_EXIT=$EXIT" >> $GITHUB_OUTPUT
          echo "QEMU exit code: $EXIT (expect 33 for success)"
          echo "--- smoke.log tail ---"
          tail -n 120 smoke.log || echo "(smoke.log was never created — QEMU likely failed to launch)"

      - name: Assert isa-debug-exit success (exit == 33)
        run: |
          # isa-debug-exit maps writes to (val << 1) | 1:
          #   0x10 (success) -> 33
          #   0x11 (failure) -> 35
          #   timeout via `timeout(1)` -> 124
          # Any panic / triple-fault would either hang (-> 124) or kill QEMU
          # with a non-33 code, so the exact equality is the strongest signal.
          if [ "${{ steps.smoke.outputs.QEMU_EXIT }}" != "33" ]; then
            echo "FAIL: smoke exit ${{ steps.smoke.outputs.QEMU_EXIT }} != 33"
            exit 1
          fi
          # Belt-and-braces: confirm the "ALL PASS" banner is present.
          grep -q "\[ SMOKE \] ALL PASS" smoke.log \
            || (echo "FAIL: 'ALL PASS' banner not seen in smoke log" && exit 1)
          echo "Kernel smoke PASSED"

      - name: Upload smoke log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-log
          path: smoke.log

  interactive-smoke:
    name: QEMU interactive shell (TCP serial)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, llvm-tools-preview
          targets: x86_64-unknown-none, x86_64-unknown-uefi
      - name: Install QEMU, OVMF, nasm, python, ncat
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 ovmf nasm mtools python3 ncat

      - name: Build kernel + bootloader, stage ESP
        # Same static-relocation requirement as boot-smoke (kernel must not
        # be PIE or the bootloader hands it off with unfixed RIP-relative
        # GOT addresses).
        run: |
          RUSTFLAGS="-C relocation-model=static -C link-arg=-no-pie" \
            cargo build --package racore --target x86_64-unknown-none
          cargo build --package racos-boot --target x86_64-unknown-uefi
          mkdir -p esp/EFI/BOOT
          cp target/x86_64-unknown-uefi/debug/bootx64.efi esp/EFI/BOOT/BOOTX64.EFI
          cp target/x86_64-unknown-none/debug/racore esp/racore.elf
          if [ -d initramfs-root ]; then
            python3 scripts/pack-initramfs.py initramfs-root esp/initramfs.img
          fi

      - name: Boot + drive racsh over TCP-serial
        run: |
          for cand in \
            /usr/share/OVMF/OVMF_CODE.fd \
            /usr/share/OVMF/OVMF_CODE_4M.fd \
            /usr/share/qemu/OVMF.fd; do
            if [ -f "$cand" ]; then OVMF="$cand"; break; fi
          done
          if [ -z "$OVMF" ]; then echo "FAIL: no OVMF firmware"; exit 1; fi
          echo "Using OVMF=$OVMF"
          qemu-system-x86_64 \
            -machine q35 -cpu qemu64 -m 512M \
            -drive if=pflash,format=raw,file=$OVMF,readonly=on \
            -drive file=fat:rw:esp,format=raw \
            -chardev socket,id=ser,host=127.0.0.1,port=4444,server=on,wait=off \
            -serial chardev:ser \
            -display none -no-reboot \
            > qemu-host.log 2>&1 &
          QEMU_PID=$!
          # Give QEMU/UEFI time to boot to the racsh prompt
          sleep 5
          # Drive racsh: send a few commands, capture serial replies for 6s
          (
            sleep 1; printf 'pwd\n'
            sleep 1; printf 'echo ci-smoke-ok\n'
            sleep 1; printf 'cat /proc/version\n'
            sleep 2
          ) | timeout 8 ncat 127.0.0.1 4444 > shell.log || true
          kill $QEMU_PID 2>/dev/null || true
          wait $QEMU_PID 2>/dev/null || true
          echo "--- qemu-host.log (whatever QEMU printed before being killed) ---"
          cat qemu-host.log || true
          echo "--- shell.log ---"
          cat shell.log

      - name: Assert shell responded
        run: |
          grep -q "racsh\\$" shell.log \
            || (echo "FAIL: racsh prompt not seen" && exit 1)
          grep -q "^/\s*$" shell.log \
            || (echo "FAIL: pwd did not return /" && exit 1)
          grep -q "ci-smoke-ok" shell.log \
            || (echo "FAIL: echo did not roundtrip" && exit 1)
          grep -q "RacOS version" shell.log \
            || (echo "FAIL: cat /proc/version did not return content" && exit 1)
          echo "Interactive shell PASSED"

      - name: Upload shell log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shell-log
          path: shell.log

  lint:
    name: Format + clippy (advisory)
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy, rust-src
          targets: x86_64-unknown-none, x86_64-unknown-uefi
      - name: rustfmt check
        run: cargo fmt --all -- --check
      - name: clippy (kernel)
        run: cargo clippy --package racore --target x86_64-unknown-none -- -W clippy::all
