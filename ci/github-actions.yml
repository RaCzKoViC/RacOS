# RacOS CI Pipeline
# Stages: lint → build → test-unit → test-boot → test-integration → build-image

name: RacOS CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  TARGET: x86_64-unknown-none

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy, rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-unknown-none
      - name: Install nasm
        run: sudo apt-get install -y nasm
      - name: Build workspace
        run: cargo build --workspace

  test-unit:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - name: Run unit tests
        run: cargo test --workspace

  test-boot:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-unknown-none
      - name: Install QEMU and nasm
        run: sudo apt-get install -y qemu-system-x86 nasm ovmf
      - name: Build kernel
        run: cargo build --package racore --target $TARGET
      - name: Boot test
        run: |
          timeout 10 qemu-system-x86_64 \
            -machine q35 -cpu qemu64 -m 256M \
            -drive if=pflash,format=raw,file=/usr/share/OVMF/OVMF_CODE.fd,readonly=on \
            -kernel target/$TARGET/debug/racore \
            -serial stdio -display none -no-reboot \
            2>&1 | tee boot.log || true
          # Validate boot output
          grep -q "RACORE: RacOS kernel starting" boot.log
          grep -q "RACORE: Entering idle loop" boot.log
          echo "Boot test PASSED"

  build-image:
    runs-on: ubuntu-latest
    needs: [test-unit, test-boot]
    steps:
      - uses: actions/checkout@v4
      - name: Build ISO image
        run: echo "ISO build not yet implemented (Sprint 2)"
